<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../JS/ResetPassFrontend.js" defer></script>
  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center relative overflow-hidden">

  <!-- Background -->
<img 
  src="https://images.unsplash.com/photo-1448375240586-882707db888b?w=1920&q=80" 
  alt="Mountain background"
  class="absolute inset-0 w-full h-full object-cover"
/>

  <!-- Overlay -->
  <div class="absolute inset-0 bg-black/20"></div>

  <!-- Forgot Password Form -->
  <form id="forgotForm" class="relative bg-white/10 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-96">

    <h2 class="text-2xl font-bold mb-2 text-white text-center">Forgot Password</h2>
    <p class="text-white text-sm text-center mb-4">Enter your email to receive a reset OTP</p>

    <!-- User Type -->
    <div class="mb-4 flex justify-center gap-6 text-white font-medium">
      <label>
        <input type="radio" name="userType" id="trekker" value="trekker" checked />
        Trekker
      </label>
      <label>
        <input type="radio" name="userType" id="organizer" value="organizer" />
        Organizer
      </label>
    </div>

    <!-- Email + OTP Button -->
    <div class="mb-4">
      <div class="flex gap-2">
        <input id="email" type="email" placeholder="Enter your email" required
          class="flex-1 p-2 border rounded focus:ring-2 focus:ring-blue-400" />
        <button type="button" id="otpBtn" onclick="sendResetOTP()"
          class="min-w-[90px] flex items-center justify-center gap-1 bg-blue-500 text-white px-3 rounded-lg hover:bg-blue-600 transition disabled:opacity-60 disabled:cursor-not-allowed">
          <span id="otpBtnText">Get OTP</span>
          <span id="otpSpinner" class="hidden" style="width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;"></span>
        </button>
      </div>
      <p id="otpStatus" class="mt-1 text-sm hidden"></p>
    </div>

    <!-- OTP -->
    <div class="mb-4">
      <input id="otp" type="text" placeholder="Enter OTP" required
        class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-400" />
    </div>

    <!-- New Password -->
    <div class="mb-4">
      <input id="newPassword" type="password" placeholder="New Password" required
        class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-400" />
    </div>

    <!-- Confirm New Password -->
    <div class="mb-6">
      <input id="confirmPassword" type="password" placeholder="Confirm New Password" required
        class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-400" />
    </div>

    <!-- Submit -->
    <button type="submit" id="resetBtn"
      class="w-full bg-green-700 text-white py-2 rounded-lg hover:bg-green-900 transition font-semibold disabled:opacity-60 disabled:cursor-not-allowed">
      Reset Password
    </button>

    <!-- Back to Login -->
    <p class="text-center mt-4 text-sm text-white">
      <a href="login.html" class="text-green-00 hover:underline">Back to Login</a>
    </p>

  </form>

</body>
</html>
